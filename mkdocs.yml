site_name: whecho
site_description: Linux echo with webhooks!
site_url: https://cvraut.github.io/whecho
repo_url: https://github.com/cvraut/whecho
repo_name: cvraut/whecho

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Python API: api.md
  - Messaging Platforms:
    - Discord: platforms/discord.md
    - Slack: platforms/slack.md
    - Webex: platforms/webex.md
    - Microsoft Teams: platforms/teams.md

plugins:
  - search
